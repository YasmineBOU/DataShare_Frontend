<div class="w-full min-h-screen flex flex-col justify-center items-center px-4 sm:px-6 lg:px-8">

  <div class="w-full max-w-md lg:max-w-lg">
    <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10">
      
      <form class="space-y-6" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <h2 class="text-center text-3xl font-bold text-gray-900">
          Créer un compte
        </h2>
        <div>
          <label for="email" class="block text-sm font-normal text-gray-700">
            Email
          </label>
          <div class="mt-1">
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-btn-orange-border focus:border-btn-orange-border sm:text-sm"
              formControlName="email"
              placeholder="Saisissez votre email..."
            />
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-normal text-gray-700">
            Mot de passe
          </label>
          <div class="mt-1">
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-btn-orange-border focus:border-btn-orange-border sm:text-sm"
              formControlName="password"
              placeholder="Saisissez votre mot de passe..."
            />
          </div>
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm font-normal text-gray-700">
            Vérification du mot de passe
          </label>
          <div class="mt-1">
            <input
              id="confirmPassword"
              name="confirmPassword"
              type="password"
              autocomplete="current-password"
              required
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-btn-orange-border focus:border-btn-orange-border sm:text-sm"
              formControlName="confirmPassword"
              placeholder="Saisissez le à nouveau"
            />
          </div>
        </div>

        <div class="mt-6 text-center text-sm text-gray-600">
            <a href="#" class="font-normal text-primary-orange hover:text-btn-amber-600" routerLink="/login">
                J'ai déjà un compte
            </a>
        </div>

        <div>
          <button
            type="submit"
            class="w-full flex justify-center py-2 px-4 border border-btn-orange-border rounded-md shadow-sm text-sm font-normal text-btn-orange-text bg-btn-orange-bg hover:bg-btn-orange-hover-bg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-orange">
            Créer mon compte
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
