<header
  class="shadow"
  [ngClass]="{
    'bg-[var(--color-header-authenticated-user)]': isAuthenticated,
    'bg-[var(--color-header-non-authenticated-user)]': !isAuthenticated
  }"
>
  <div class="w-full px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16 items-center">
      <!-- Logo -->
      <div class="flex-shrink-0">
        <a href="#" class="text-xl font-bold">DataShare</a>
      </div>

      <!-- Navigation -->
      <nav class="flex items-center gap-3 sm:gap-4">
        <!-- Authenticated user -->
        <ng-container *ngIf="isAuthenticated; else notAuthenticated">
          <a
            class="inline-block px-4 py-2 border border-transparent rounded-md
                  bg-[var(--color--header-btn-bg)] text-white font-normal
                  hover:bg-[var(--color-header-btn-hover-bg)] focus:outline-none focus:ring-2 focus:ring-white"
          >
            Mon espace
          </a>
          <button
            class="px-4 py-2 rounded bg-[var(--color--header-btn-bg)] text-white font-semibold hover:bg-[var(--color-header-btn-hover-bg)] focus:outline-none focus:ring-2 focus:ring-white"
          >
            Déconnexion
          </button>
        </ng-container>

        <!-- Not authenticated user -->
        <ng-template #notAuthenticated>
          <a
            class="inline-block px-4 py-2 border border-transparent rounded-md
                  bg-[var(--color--header-btn-bg)] text-white font-normal
                  hover:bg-[var(--color-header-btn-hover-bg)] focus:outline-none focus:ring-2 focus:ring-white"
                  routerLink="/login"
          >
            Se connecter
          </a>

        </ng-template>
      </nav>
    </div>
  </div>
</header>
