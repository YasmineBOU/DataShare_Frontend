<!-- header.html -->
<header
  class="shadow"
  [ngClass]="{
    'bg-[var(--color-header-default)]': !((isAuthenticated$ | async) && isDashboardPage),
    'bg-[var(--color-header-dashboard)]': (isAuthenticated$ | async) && isDashboardPage,
  }"
>
  <div class="w-full px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16 items-center">
      <!-- Logo -->
      <div *ngIf="!((isAuthenticated$ | async) && isDashboardPage)" class="flex-shrink-0">
        <a 
          routerLink="/" 
          class="text-left text-3xl font-semibold tracking-wide"
        >
          DataShare
        </a>
      </div>

      <!-- Navigation -->
      <nav class="ml-auto flex items-center gap-3 sm:gap-4">
        <!-- Cas 1 : User non connecté -->
        <ng-container *ngIf="!(isAuthenticated$ | async)">
          <a
            class="inline-block px-4 py-2 border border-transparent rounded-md
                  bg-[var(--color--header-btn-bg)] text-white font-normal
                  hover:bg-[var(--color-header-btn-hover-bg)] focus:outline-none focus:ring-2 focus:ring-white"
                  routerLink="/register"
          >
            Créer un compte
          </a>
          <a
            class="inline-block px-4 py-2 border border-transparent rounded-md
                  bg-[var(--color--header-btn-bg)] text-white font-normal
                  hover:bg-[var(--color-header-btn-hover-bg)] focus:outline-none focus:ring-2 focus:ring-white"
                  routerLink="/login"
          >
            Se connecter
          </a>
        </ng-container>

        <!-- Case 2 : Authenticated user -->
        <ng-container *ngIf="isAuthenticated$ | async">
          <!-- Case 2a : Upload page -->
          <ng-container *ngIf="isUploadPage || isDownloadPage">
            <button
              class="inline-block px-4 py-2 border border-transparent rounded-md
                    bg-[var(--color--header-btn-bg)] text-white font-normal
                    hover:bg-[var(--color-header-btn-hover-bg)] focus:outline-none focus:ring-2 focus:ring-white"
                    routerLink="/dashboard"
            >
              Mon espace
            </button>
          </ng-container>

          <!-- Case 2b : Dashboard page -->
          <ng-container *ngIf="isDashboardPage">
            <!-- Mobile device -->
            <div *ngIf="isMobile" class="relative pl-2 inline-flex md:hidden" (click)="$event.stopPropagation()">
              <!-- Profile button -->
              <button
                class="w-12 h-12 rounded-full 
                  border border-primary-orange 
                  overflow-hidden p-0"
                aria-label="Open profile menu"
                (click)="toggleProfileMenu()"
              >
                <img
                  src="assets/icons/buttons/profile.svg"
                  alt="ProfileMenu"
                  class="block w-full h-full object-cover"
                />

              </button>

              <!-- Profile dropdown menu -->
              <div 
                *ngIf="profileMenuOpen"
                class="absolute right-0 mt-9 w-40 overflow-hidden rounded-md border border-btn-orange-border bg-white shadow-lg z-50 gap-2 flex flex-col items-start p-2"
              >
                <a
                  class="inline-block px-4 py-2 border border-transparent rounded-md
                    text-primary-orange font-normal hover:bg-[var(--color-header-btn-hover-bg)] 
                    focus:outline-none focus:ring-2 focus:ring-white"
                  routerLink="/files/upload"
                  (click)="toggleProfileMenu()"
                >
                  Ajouter des fichiers
                </a>
                <button
                  class="inline-flex items-center px-4 py-2 border border-transparent rounded-md
                    text-primary-orange font-normal
                    hover:bg-[var(--color-header-btn-hover-bg)] focus:outline-none focus:ring-2 focus:ring-white
                    cursor-pointer"
                  (click)="logout(); toggleProfileMenu();"
                >
                  <img src="/assets/icons/buttons/logout.svg" alt="logout" class="w-4 h-4 mr-1" /> 
                  Déconnexion
                </button>
                

              </div>
            </div>
            <!-- Other device -->
            <ng-container *ngIf="!isMobile">
              <a
                class="inline-block px-4 py-2 border border-transparent rounded-md
                      bg-[var(--color--header-btn-bg)] text-white font-normal
                      hover:bg-[var(--color-header-btn-hover-bg)] focus:outline-none focus:ring-2 focus:ring-white"
                      routerLink="/files/upload"
              >
                Ajouter des fichiers
              </a>
              <button
                class="ml-2 inline-flex items-center px-4 py-2 border border-transparent rounded-md
                      text-primary-orange font-normal
                      hover:bg-[var(--color-header-btn-hover-bg)] focus:outline-none focus:ring-2 focus:ring-white
                      cursor-pointer"
                      (click)="logout()"
              >
                <img src="/assets/icons/buttons/logout.svg" alt="logout" class="w-4 h-4 mr-1" /> 
                Déconnexion
              </button>
            </ng-container>
          
          </ng-container>
          
        </ng-container>
      </nav>
    </div>
  </div>
</header>
