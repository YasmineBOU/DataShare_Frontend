<div class="min-h-screen bg-gray-50 flex flex-col justify-center items-center p-4">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    
    <div *ngIf="!showForm" class="flex flex-col items-center space-y-4">
      <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">
        Tu veux partager un fichier ?
      </h1>

      <label
        for="file-upload"
        class="flex items-center justify-center cursor-pointer bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-md shadow-sm transition duration-300"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5 mr-2"
          viewBox="0 0 20 20"
          fill="currentColor"
        >
          <path
            fill-rule="evenodd"
            d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z"
            clip-rule="evenodd"
          />
        </svg>
      </label>
      <input
        id="file-upload"
        type="file"
        class="hidden"
        (change)="onFileSelected($event)"
      />

    </div>

    <!-- Display the form if file is selected -->
    <div *ngIf="showForm && selectedFile" class="mt-6">
      <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">
        Ajouter un fichier
      </h1>
      <div class="flex items-center justify-between bg-gray-50 p-4 rounded-md">
        <!-- File information -->
        <div class="flex-1 min-w-0">
          <p class="text-lg font-semibold text-indigo-600 truncate" [title]="selectedFile.name">
            {{ selectedFile.name }}
          </p>
          <p class="text-sm text-gray-500">
            {{ getHumanReadableSize(selectedFile.size) }}
          </p>
        </div>
        <!-- Replace file button -->
        <label class="ml-4 cursor-pointer flex-shrink-0">
          <input
            type="file"
            class="hidden"
            (change)="onFileSelected($event)"
          />
          <span class="inline-flex items-center px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium rounded-md shadow-sm transition duration-300">
            Changer
          </span>
        </label>
      </div>  
           
      <form [formGroup]="fileUploadForm"  class="space-y-4">
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">
            Mot de passe
          </label>
          <div class="mt-1">
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
              formControlName="password"
              placeholder="Optionnel"
            />
          </div>
        </div>
        <div>
            <label for="expiration" class="block text-sm font-medium text-gray-700">
              Expiration
            </label>
            <select
              id="expiration"
              formControlName="expiration"
              class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
            >   
              <option *ngFor="let option of expirationOptions | keyvalue" [ngValue]="option.key">
                {{ option.value }}
              </option>
            </select>
        </div>

        <div class="mt-6">
          <button
            type="button"
            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
            (click)="onUpload()"
          >
          Téléverser
        </button>
        </div>
      </form>
    </div>
  </div>
</div>
