<div class="min-h-screen flex flex-col justify-center items-center p-4">
  <!-- <div class="p-8 rounded-lg shadow-md w-full max-w-md"> -->
    
    <div *ngIf="!selectedFile" class="flex flex-col items-center space-y-4 w-full max-w-md md:max-w-lg lg:max-w-xl">
      <h1 class="text-2xl font-normal text-center text-gray-800 mb-6">
        Tu veux partager un fichier ?
      </h1>
      <div class="flex items-center border border-transparent rounded p-2">
  <label for="file-upload" class="flex items-center cursor-pointer group">
    <input
      id="file-upload"
      type="file"
      class="sr-only"
      (change)="onFileSelected($event)"
    />

    <div
      class="h-16 w-16 rounded-full bg-black flex items-center justify-center
             shadow-lg group-hover:shadow-[0_0_15px_5px_rgba(107,114,128,0.5)]
             group-active:shadow-[0_0_20px_7px_rgba(75,85,99,0.7)]
             group-focus:ring-4 group-focus:ring-gray-600
             transition-shadow transition-colors duration-200"
    >
      <img src="/assets/icons/cloud-upload.svg" alt="upload" class="w-6 h-6" />
    </div>

  </label>
</div>


    </div>

    <!-- Display the form if file is selected -->
    <div *ngIf="selectedFile" class="bg-white mt-6 p-8 rounded-lg shadow-md w-full max-w-md md:max-w-lg lg:max-w-xl">
      <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">
        Ajouter un fichier
      </h1>
      <div class="flex items-center justify-between p-4 rounded-md">
        <!-- File information -->
        <div class="flex-1 min-w-0">
          <p class="text-base font-normal truncate" [title]="selectedFile.name">
            {{ selectedFile.name }}
          </p>
          <p class="text-sm">
            {{ getHumanReadableSize(selectedFile.size) }}
          </p>
        </div>

        <!-- Display before sending the file to the server for link generation -->
        <!-- Replace file button -->
        <label *ngIf="!generatedLink" class="ml-4 cursor-pointer flex-shrink-0">
          <input
            type="file"
            class="hidden"
            (change)="onFileSelected($event)"
          />
          <span class="flex justify-center items-center border border-btn-change-border px-4 py-2 hover:bg-btn-change-hover-bg text-btn-change-text font-medium rounded-md shadow-sm transition duration-300">
            Changer
          </span>
        </label>
      </div>  
           
      <form *ngIf="!generatedLink" [formGroup]="fileUploadForm"  class="space-y-4">
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">
            Mot de passe
          </label>
          <div class="mt-1">
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-btn-change-border focus:border-btn-change-border sm:text-sm"
              formControlName="password"
              placeholder="Optionnel"
            />
          </div>
        </div>
        <div>
            <label for="expiration" class="block text-sm font-medium text-gray-700">
              Expiration
            </label>
            <select
              id="expiration"
              formControlName="expiration"
              class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-btn-change-border focus:border-btn-change-border sm:text-sm"
            >   
              <option *ngFor="let option of expirationOptions | keyvalue" [ngValue]="option.key">
                {{ option.value }}
              </option>
            </select>
        </div>

        <div class="mt-6">
          <button
            type="button"
            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
            (click)="onUpload()"
          >
          Téléverser
        </button>
        </div>
      </form>

      
        <!-- Display only if the link has been generated -->
        <div *ngIf="generatedLink" class="mt-6">
          <p class="text-base font-normal text-left">
            {{ dwlLinkMessage }}
          </p>
          <p class="mt-4 text-center text-primary-orange bg-gray-100 p-2 rounded cursor-pointer
         max-w-full overflow-x-auto whitespace-nowrap underline" (click)="copyLinkToClipboard()">
            {{ generatedLink }}
          </p>
          
          <div class="mt-6">
            <button
              type="button"
              class="mx-auto flex justify-center py-2 px-4 border border-btn-orange-border rounded-md shadow-sm text-sm font-normal text-btn-orange-text bg-btn-orange-bg hover:bg-btn-orange-hover-bg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-orange"
              (click)="copyLinkToClipboard()"
            >
              Copier le lien
            </button>
          </div>

        </div>

      
    </div>
  </div>
